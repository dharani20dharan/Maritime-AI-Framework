# ─────────────────────────────────────────────────────────────────────────────
#  MAF — Maritime AI Framework
#  Local development stack
# ─────────────────────────────────────────────────────────────────────────────

networks:
  maf-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  neo4j-data:
  neo4j-logs:
  bathymetry-data:
  cassandra-data:
  eez-data:

services:

  # ── ZOOKEEPER ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: maf-zookeeper
    networks: [maf-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr" 
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── KAFKA ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: maf-kafka
    networks: [maf-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"     # external (host access only — do not expose 9092)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Three listeners:
      #   INTERNAL  — container-to-container on Docker network (kafka:9092)
      #   UI        — for Kafka UI on the same Docker network (kafka:9093)
      #   EXTERNAL  — for host machine access (localhost:29092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,UI:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,UI://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,UI://kafka:9093,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 5242880
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: on-failure:5   # retry up to 5 times if ZooKeeper wasn't ready
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s   # Kafka needs ZooKeeper fully ready before it can register

  # ── KAFKA UI (development convenience) ────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: maf-kafka-ui
    networks: [maf-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: maf-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  # ── APACHE NIFI ───────────────────────────────────────────────────────────
  nifi:
    image: apache/nifi:1.25.0
    container_name: maf-nifi
    networks: [maf-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: maf_nifi_admin_2024
      NIFI_WEB_HTTPS_PORT: 8443
    volumes:
      - ./infra/nifi/templates:/opt/nifi/nifi-current/conf/templates
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8443/nifi"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── NEO4J ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18.0
    container_name: maf-neo4j
    networks: [maf-net]
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/maf_neo4j_2024
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./infra/neo4j/init:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── AIS INGESTOR ──────────────────────────────────────────────────────────
  # Engineer A — Stage 1: connects to AISStream.io websocket, publishes to Kafka
  ais-ingestor:
    build:
      context: .
      dockerfile: ingestion/ais/Dockerfile
    container_name: maf-ais-ingestor
    networks: [maf-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_RAW: ais.raw
      KAFKA_TOPIC_VALIDATED: ais.validated
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}   # set in .env
      REPLAY_MODE: ${REPLAY_MODE:-true}            # true = use local sample data
      REPLAY_FILE: /data/sample_ais.ndjson
    volumes:
      - ./ingestion/ais/sample_data:/data
    restart: unless-stopped

  # ── SIGNAL ANALYSER ───────────────────────────────────────────────────────
  # Engineer A — Stage 1: CV beacon detection (M-AIS-BEACON), speed check (M-SPEED-ANOMALY)
  signal-analyser:
    build:
      context: .
      dockerfile: ingestion/ais/Dockerfile.analyser
    container_name: maf-signal-analyser
    networks: [maf-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_INPUT_TOPIC: ais.validated
      KAFKA_OUTPUT_TOPIC: ais.anomalies
      CV_BEACON_THRESHOLD: "0.01"
      SPEED_MAX_KNOTS: "50"
    restart: unless-stopped

  # ── SANCTIONS INGESTOR ────────────────────────────────────────────────────
  # Engineer A — Stage 1 gap fix: OFAC SDN, UN, OpenSanctions feeds
  sanctions-ingestor:
    build:
      context: .
      dockerfile: ingestion/sanctions/Dockerfile
    container_name: maf-sanctions-ingestor
    networks: [maf-net]
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: maf_neo4j_2024
      OFAC_SDN_URL: https://sanctionslist.ofac.treas.gov/Home/SdnList
      OPENSANCTIONS_URL: https://data.opensanctions.org/datasets/latest/vessels/targets.nested.json
      REFRESH_INTERVAL_SECONDS: "3600"   # hourly; capped at 24h max
    restart: unless-stopped

  # ── EEZ LOADER ────────────────────────────────────────────────────────────
  # Engineer A — Stage 1: loads EEZ boundary GeoJSON into Neo4j once on startup
  eez-loader:
    build:
      context: .
      dockerfile: ingestion/eez/Dockerfile
    container_name: maf-eez-loader
    networks: [maf-net]
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: maf_neo4j_2024
      EEZ_DIR: /data
    volumes:
      - eez-data:/data
    restart: "no"   # one-shot loader

  # ── BATHYMETRY LOADER ─────────────────────────────────────────────────────
  # Engineer A — Stage 2: pre-processes GEBCO NetCDF → lightweight depth lookup
  bathymetry-loader:
    build:
      context: .
      dockerfile: ingestion/bathymetry/Dockerfile
    container_name: maf-bathymetry-loader
    networks: [maf-net]
    environment:
      GEBCO_NC_PATH: /data/GEBCO_2026.nc
      OUTPUT_PARQUET: /data/depth_index.parquet
    volumes:
      - ./ingestion/bathymetry/data:/data
    restart: "no"   # one-shot, run after GEBCO download

  # ── NEO4J ETL ─────────────────────────────────────────────────────────────
  # Engineer A — consumes ais.validated → writes vessel nodes to Neo4j
  neo4j-etl:
    build:
      context: .
      dockerfile: knowledge_graph/Dockerfile.etl
    container_name: maf-neo4j-etl
    networks: [maf-net]
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_INPUT_TOPIC: ais.validated
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: maf_neo4j_2024
    restart: unless-stopped


  # ── CASSANDRA ─────────────────────────────────────────────────────────────
  # Engineer A — 90-day AIS position history store
  # Optimised for time-series writes: partition by mmsi + date bucket,
  # cluster by timestamp DESC so newest positions are read first.
  cassandra:
    image: cassandra:5.0
    container_name: maf-cassandra
    networks: [maf-net]
    ports:
      - "9042:9042"       # CQL native transport (host access)
    environment:
      CASSANDRA_CLUSTER_NAME: maf-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M   # keep footprint reasonable alongside Neo4j
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./infra/cassandra/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s   # Cassandra is slow to start — give it time

  # ── CASSANDRA SCHEMA INIT ─────────────────────────────────────────────────
  # One-shot: waits for Cassandra to be healthy, then runs schema CQL.
  cassandra-init:
    image: cassandra:5.0
    container_name: maf-cassandra-init
    networks: [maf-net]
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./infra/cassandra/init:/init
    command: >
      bash -c "cqlsh cassandra -f /init/schema.cql && echo 'Schema applied'"
    restart: "no"

  # ── AIS HISTORY WRITER ────────────────────────────────────────────────────
  # Engineer A — consumes ais.validated, writes to Cassandra.
  # TTL of 90 days applied at write time — Cassandra auto-expires old rows.
  ais-history-writer:
    build:
      context: .
      dockerfile: ingestion/cassandra/Dockerfile
    container_name: maf-ais-history-writer
    networks: [maf-net]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_INPUT_TOPIC: ais.validated
      KAFKA_GROUP_ID: maf-cassandra-writer
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_KEYSPACE: maf_ais
      HISTORY_TTL_DAYS: "90"
      BATCH_SIZE: "200"
    restart: unless-stopped

  # ── FASTAPI OUTPUT ────────────────────────────────────────────────────────
  # Engineer B owns content; Engineer A owns infra/deployment
  api:
    build:
      context: .
      dockerfile: output/Dockerfile
    container_name: maf-api
    networks: [maf-net]
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: maf_neo4j_2024
    restart: unless-stopped